services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    networks:
      - s3gallery
    depends_on:
      php:
        condition: service_healthy

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
    restart: unless-stopped
    volumes:
      - ./public:/var/www/public
      - ./src:/var/www/src
      - ./templates:/var/www/templates
      - ./composer.json:/var/www/composer.json
    env_file:
      - .env
    networks:
      - s3gallery
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - s3gallery
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  storage:
    image: rustfs/rustfs
    restart: unless-stopped
    expose:
      - "9000"
    ports:
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - storage-data:/data
    networks:
      - s3gallery
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  storage-init:
    image: amazon/aws-cli
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws --endpoint-url http://storage:9000 s3 mb s3://${S3_BUCKET} 2>/dev/null || true
        echo "Bucket '${S3_BUCKET}' ready."
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ${S3_REGION}
    networks:
      - s3gallery
    depends_on:
      storage:
        condition: service_healthy
    restart: "no"

networks:
  s3gallery:
    driver: bridge

volumes:
  db-data:
  storage-data:
